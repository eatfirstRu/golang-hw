version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: calendar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    image: golang:1.22-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    command: >
      sh -c "
        apk add --no-cache postgresql16-client &&
        for f in /migrations/*.sql; do
          echo \"Applying $$f...\";
          grep -A9999 '-- +goose Up' $$f | grep -v '-- +goose' | psql -h postgres -U calendar -d calendar;
        done
      "
    environment:
      PGPASSWORD: calendar

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 5s
      timeout: 5s
      retries: 15

  calendar:
    build:
      context: ..
      dockerfile: build/Dockerfile.calendar
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build:
      context: ..
      dockerfile: build/Dockerfile.scheduler
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  storer:
    build:
      context: ..
      dockerfile: build/Dockerfile.storer
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy

  integration-tests:
    build:
      context: ..
      dockerfile: build/Dockerfile.tests
    depends_on:
      calendar:
        condition: service_started
      scheduler:
        condition: service_started
      storer:
        condition: service_started
    environment:
      CALENDAR_URL: http://calendar:8080
      DATABASE_DSN: "host=postgres port=5432 user=calendar password=calendar dbname=calendar sslmode=disable"
