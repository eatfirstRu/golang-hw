version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: calendar
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    image: golang:1.22-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    command: >
      sh -c "
        apk add --no-cache postgresql16-client &&
        for f in /migrations/*.sql; do
          echo \"Applying $$f...\";
          grep -A9999 '-- +goose Up' $$f | grep -v '-- +goose' | psql -h postgres -U calendar -d calendar;
        done
      "
    environment:
      PGPASSWORD: calendar

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:9092"]
      interval: 5s
      timeout: 5s
      retries: 15

  calendar:
    build:
      context: ..
      dockerfile: build/Dockerfile.calendar
    ports:
      - "8888:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - CALENDAR_DB_HOST=postgres

  scheduler:
    build:
      context: ..
      dockerfile: build/Dockerfile.scheduler
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      - CALENDAR_DB_HOST=postgres
      - CALENDAR_KAFKA_BROKER=kafka:9092

  storer:
    build:
      context: ..
      dockerfile: build/Dockerfile.storer
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    environment:
      - CALENDAR_DB_HOST=postgres
      - CALENDAR_KAFKA_BROKER=kafka:9092

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - calendar

volumes:
  pgdata:
